<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩语音频学习助手</title>
    <style>
        :root {
            --primary: #5B6FE8;
            --primary-dark: #4A5BD4;
            --primary-light: #EEF0FD;
            --accent: #FF7E67;
            --accent-hover: #E8694F;
            --bg: #f6f7fb;
            --card-bg: #ffffff;
            --text: #2D3142;
            --text-light: #6B7194;
            --text-lighter: #9BA0B8;
            --border: #E4E7F0;
            --border-light: #F0F2F8;
            --shadow-sm: 0 1px 3px rgba(45, 49, 66, 0.06);
            --shadow: 0 4px 16px rgba(45, 49, 66, 0.08);
            --shadow-lg: 0 12px 32px rgba(45, 49, 66, 0.12);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-korean: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', 'Nanum Gothic', sans-serif;
            --font-chinese: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-chinese);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(91, 111, 232, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -180px;
            left: -120px;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 126, 103, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* ========== 顶部标题 ========== */
        .header {
            text-align: center;
            padding: 36px 20px 20px;
            position: relative;
        }
        .header .icon-row {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .header .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #5B6FE8 0%, #7B8FF0 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 6px 20px rgba(91, 111, 232, 0.3);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .header .subtitle {
            font-size: 15px;
            color: var(--text-light);
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ========== 难度选择区 ========== */
        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-lighter);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-align: center;
        }
        .difficulty-section {
            margin-bottom: 20px;
        }
        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        @media (max-width: 520px) {
            .difficulty-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
        }
        .diff-btn {
            position: relative;
            padding: 14px 10px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--card-bg);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            transition: all var(--transition);
            text-align: center;
            user-select: none;
            outline: none;
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.3px;
        }
        .diff-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .diff-btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }
        .diff-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
            box-shadow: 0 6px 20px rgba(91, 111, 232, 0.35);
            transform: translateY(-1px);
        }
        .diff-btn .level-num {
            display: block;
            font-size: 11px;
            font-weight: 500;
            opacity: 0.7;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .diff-btn.active .level-num {
            opacity: 0.9;
        }

        /* ========== 生成按钮 ========== */
        .generate-section {
            text-align: center;
            margin-bottom: 24px;
        }
        .btn-generate {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            background: linear-gradient(135deg, #FF7E67 0%, #FF9A7C 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 28px rgba(255, 126, 103, 0.35);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            user-select: none;
            outline: none;
        }
        .btn-generate::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            pointer-events: none;
        }
        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(255, 126, 103, 0.45);
        }
        .btn-generate:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 126, 103, 0.35);
        }
        .btn-generate .sparkle {
            font-size: 20px;
            animation: sparkle-pulse 1.8s ease-in-out infinite;
        }
        @keyframes sparkle-pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.25);
            }
        }
        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 4px 12px rgba(255, 126, 103, 0.2);
        }

        /* ========== 内容卡片 ========== */
        .content-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            transition: all var(--transition);
        }
        .content-card.empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-lighter);
        }
        .content-card.empty-state .empty-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            opacity: 0.6;
        }
        .content-card.empty-state p {
            font-size: 15px;
        }
        .content-card h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-lighter);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .content-card h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: var(--primary);
            border-radius: 2px;
            flex-shrink: 0;
        }
        .korean-text {
            font-family: var(--font-korean);
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 12px;
            padding: 14px 18px;
            background: #FAFBFC;
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--primary);
            letter-spacing: 0.5px;
            word-break: keep-all;
        }
        .chinese-text {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 16px;
            padding-left: 18px;
            line-height: 1.5;
        }
        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 6px;
        }
        .info-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 20px;
            background: #F8F9FC;
            color: var(--text-light);
            font-weight: 500;
        }
        .info-tag .tag-icon {
            font-size: 14px;
        }
        .vocab-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .vocab-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            background: var(--primary-light);
            color: var(--primary-dark);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font-korean);
            letter-spacing: 0.3px;
        }
        .vocab-chip .vocab-meaning {
            font-family: var(--font-chinese);
            font-size: 12px;
            opacity: 0.8;
            font-weight: 400;
        }
        .pronunciation-tip {
            font-size: 13px;
            color: #8E6F3E;
            background: #FFFDF5;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid #F0E8D0;
            font-family: var(--font-mono);
            letter-spacing: 0.3px;
            line-height: 1.5;
        }

        /* ========== 音频播放区 ========== */
        .audio-section {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .btn-play {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 14px rgba(91, 111, 232, 0.3);
            user-select: none;
            outline: none;
            letter-spacing: 0.3px;
        }
        .btn-play:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(91, 111, 232, 0.4);
        }
        .btn-play:active {
            transform: translateY(0);
        }
        .btn-play.playing {
            background: #E85D6F;
            animation: play-glow 0.8s ease-in-out infinite;
        }
        @keyframes play-glow {
            0%,
            100% {
                box-shadow: 0 4px 14px rgba(232, 93, 111, 0.3);
            }
            50% {
                box-shadow: 0 8px 28px rgba(232, 93, 111, 0.55);
            }
        }
        .btn-play .play-icon {
            font-size: 18px;
            line-height: 1;
        }
        .audio-status {
            font-size: 13px;
            color: var(--text-lighter);
            font-style: italic;
        }

        /* ========== 作业区 ========== */
        .exercises-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        @media (max-width: 560px) {
            .exercises-grid {
                grid-template-columns: 1fr;
            }
        }
        .exercise-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 16px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }
        .exercise-card:hover {
            box-shadow: var(--shadow);
        }
        .exercise-card .ex-type {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .ex-type.dictation {
            background: #FFF0EE;
            color: #D44A3A;
        }
        .ex-type.choice {
            background: #EEF4FF;
            color: #3A6BD4;
        }
        .ex-type.fill {
            background: #F0FAF0;
            color: #3A8C4A;
        }
        .ex-type.translate {
            background: #FFF8ED;
            color: #C07A20;
        }
        .exercise-card .ex-question {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .exercise-card .ex-input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-korean);
            transition: all var(--transition);
            background: #FAFBFC;
            color: var(--text);
            outline: none;
            letter-spacing: 0.3px;
        }
        .exercise-card .ex-input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(91, 111, 232, 0.08);
        }
        .exercise-card .ex-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .exercise-card .ex-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #FAFBFC;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition);
            user-select: none;
            font-weight: 500;
        }
        .exercise-card .ex-option:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .exercise-card .ex-option .opt-letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
            color: var(--text-light);
        }
        .exercise-card .ex-hint {
            font-size: 12px;
            color: var(--text-lighter);
            margin-top: 6px;
        }
        .mini-play-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: #FFF0EE;
            color: #D44A3A;
            border: 1px solid #FDD;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
            margin-bottom: 8px;
            user-select: none;
            outline: none;
        }
        .mini-play-btn:hover {
            background: #FFE4E0;
        }

        /* ========== 答案区 ========== */
        .answer-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-answer {
            padding: 14px 32px;
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
            transition: all var(--transition);
            user-select: none;
            outline: none;
            letter-spacing: 0.3px;
            box-shadow: var(--shadow-sm);
        }
        .btn-answer:hover {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: var(--shadow);
        }
        .btn-answer.showing {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary-dark);
        }
        .answers-panel {
            display: none;
            background: #FAFBFC;
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 12px;
            border: 1px solid var(--border);
            text-align: left;
        }
        .answers-panel.visible {
            display: block;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .answers-panel .answer-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
            line-height: 1.6;
        }
        .answers-panel .answer-item:last-child {
            border-bottom: none;
        }
        .answers-panel .answer-label {
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .answers-panel .answer-value {
            font-family: var(--font-korean);
            color: #2D6B3F;
            font-weight: 500;
            font-size: 15px;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }
        .answers-panel .answer-value.zh {
            font-family: var(--font-chinese);
            color: var(--text);
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #2D3142;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            z-index: 999;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            letter-spacing: 0.3px;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ========== Footer ========== */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: var(--text-lighter);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ==================== 顶部标题 ==================== -->
        <header class="header">
            <div class="icon-row">
                <div class="logo-icon">🇰🇷</div>
            </div>
            <h1>韩语音频学习助手</h1>
            <p class="subtitle">选择你的等级，生成地道韩语音频和练习作业</p>
        </header>

        <!-- ==================== 难度选择区 ==================== -->
        <div class="difficulty-section">
            <div class="section-label">📊 选择难度等级</div>
            <div class="difficulty-grid" id="difficultyGrid">
                <button class="diff-btn active" data-level="zero">
                    零基础<span class="level-num">入门起步</span>
                </button>
                <button class="diff-btn" data-level="topik1">
                    TOPIK 1<span class="level-num">初级·日常</span>
                </button>
                <button class="diff-btn" data-level="topik2">
                    TOPIK 2<span class="level-num">中级·对话</span>
                </button>
                <button class="diff-btn" data-level="topik3">
                    TOPIK 3<span class="level-num">进阶·表达</span>
                </button>
            </div>
        </div>

        <!-- ==================== 生成按钮 ==================== -->
        <div class="generate-section">
            <button class="btn-generate" id="btnGenerate">
                <span class="sparkle">✨</span> 生成今日韩语音频
            </button>
        </div>

        <!-- ==================== 学习内容展示区 ==================== -->
        <div class="content-card empty-state" id="contentCard">
            <span class="empty-icon">📖</span>
            <p>请选择难度等级，然后点击生成按钮</p>
        </div>

        <!-- ==================== 音频播放区 ==================== -->
        <div class="audio-section" id="audioSection" style="display:none;">
            <button class="btn-play" id="btnPlay">
                <span class="play-icon">🔊</span> 播放韩语音频
            </button>
            <span class="audio-status" id="audioStatus"></span>
        </div>

        <!-- ==================== 作业区 ==================== -->
        <div id="exercisesContainer" style="display:none;">
            <div class="section-label" style="margin-top:8px;">📝 课后练习</div>
            <div class="exercises-grid">
                <!-- 听写题 -->
                <div class="exercise-card" id="exDictation">
                    <span class="ex-type dictation">🎧 听写题</span>
                    <p class="ex-question">请写出你听到的韩语句子：</p>
                    <button class="mini-play-btn" id="btnMiniPlay">🔊 点击播放音频</button>
                    <input type="text" class="ex-input" id="inputDictation" placeholder="在此输入你听到的韩语...">
                </div>
                <!-- 选择题 -->
                <div class="exercise-card" id="exChoice">
                    <span class="ex-type choice">✅ 选择题</span>
                    <p class="ex-question">这句话的中文意思是什么？</p>
                    <div class="ex-options" id="choiceOptions"></div>
                </div>
                <!-- 填空题 -->
                <div class="exercise-card" id="exFill">
                    <span class="ex-type fill">✏️ 填空题</span>
                    <p class="ex-question">请补全下面的韩语句子：</p>
                    <p style="font-family:var(--font-korean);font-size:18px;font-weight:600;margin-bottom:8px;letter-spacing:0.5px;" id="fillSentenceDisplay"></p>
                    <input type="text" class="ex-input" id="inputFill" placeholder="填入缺失的单词...">
                </div>
                <!-- 翻译题 -->
                <div class="exercise-card" id="exTranslate">
                    <span class="ex-type translate">🌐 翻译题</span>
                    <p class="ex-question">请将以下中文翻译成韩语：</p>
                    <p style="font-weight:600;color:var(--text);margin-bottom:8px;font-size:15px;" id="translatePrompt"></p>
                    <input type="text" class="ex-input" id="inputTranslate" placeholder="在此输入韩语翻译...">
                </div>
            </div>
        </div>

        <!-- ==================== 答案区 ==================== -->
        <div class="answer-section" id="answerSection" style="display:none;">
            <button class="btn-answer" id="btnAnswer">🔍 查看答案</button>
            <div class="answers-panel" id="answersPanel"></div>
        </div>

        <!-- ==================== Footer ==================== -->
        <div class="footer">
            韩语音频学习助手 · MVP v1.0 · 浏览器语音合成
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ==================== DOM 元素 ====================
            const difficultyGrid = document.getElementById('difficultyGrid');
            const diffButtons = difficultyGrid.querySelectorAll('.diff-btn');
            const btnGenerate = document.getElementById('btnGenerate');
            const contentCard = document.getElementById('contentCard');
            const audioSection = document.getElementById('audioSection');
            const btnPlay = document.getElementById('btnPlay');
            const audioStatus = document.getElementById('audioStatus');
            const exercisesContainer = document.getElementById('exercisesContainer');
            const answerSection = document.getElementById('answerSection');
            const btnAnswer = document.getElementById('btnAnswer');
            const answersPanel = document.getElementById('answersPanel');
            const btnMiniPlay = document.getElementById('btnMiniPlay');
            const inputDictation = document.getElementById('inputDictation');
            const inputFill = document.getElementById('inputFill');
            const inputTranslate = document.getElementById('inputTranslate');
            const choiceOptions = document.getElementById('choiceOptions');
            const fillSentenceDisplay = document.getElementById('fillSentenceDisplay');
            const translatePrompt = document.getElementById('translatePrompt');
            const toast = document.getElementById('toast');

            // ==================== 状态 ====================
            let currentLevel = 'zero';
            let currentContent = null;
            let isPlaying = false;
            let answersVisible = false;
            let toastTimer = null;

            // ==================== Toast ====================
            function showToast(msg) {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2200);
            }

            // ==================== 内容库 ====================
const contentDB = {
  zero: [
    {
      korean: "안녕하세요. 저는 학생입니다. 한국어를 처음 배우고 있습니다. 매일 조금씩 공부하고 있습니다.",
      chinese: "你好。我是学生。我正在学习韩语。我每天一点点地学习。",
      vocab: "안녕하세요（你好）, 학생（学生）, 배우다（学习）, 매일（每天）",
      pronunciation: "安宁哈塞哟..."
    }
  ],

  topik1: [
    {
      korean: "오늘은 날씨가 아주 좋습니다. 저는 친구와 함께 카페에 가서 커피를 마셨습니다. 우리는 즐거운 시간을 보냈습니다.",
      chinese: "今天天气很好。我和朋友一起去了咖啡店喝咖啡。我们度过了愉快的时光。",
      vocab: "날씨（天气）, 친구（朋友）, 카페（咖啡店）, 즐겁다（开心）",
      pronunciation: "..."
    }
  ],

  topik2: [
    {
      korean: "요즘 한국어를 배우는 사람들이 점점 많아지고 있습니다. 한국 드라마와 음악의 영향으로 많은 사람들이 한국어에 관심을 가지게 되었습니다.",
      chinese: "最近学习韩语的人越来越多。因为韩剧和音乐的影响，很多人开始对韩语感兴趣。",
      vocab: "요즘（最近）, 점점（逐渐）, 영향（影响）, 관심（兴趣）",
      pronunciation: "..."
    }
  ],

  topik3: [
    {
      korean: "외국어를 배우는 것은 단순히 언어 능력을 향상시키는 것뿐만 아니라, 그 나라의 문화와 사고방식을 이해하는 데에도 큰 도움이 됩니다.",
      chinese: "学习外语不仅能提高语言能力，还能帮助理解该国文化和思维方式。",
      vocab: "외국어（外语）, 향상시키다（提高）, 문화（文化）, 사고방식（思维方式）",
      pronunciation: "..."
    }
  ]
};

            // ==================== 获取随机内容 ====================
            function getRandomContent(level) {
                const pool = contentDB[level];
                if (!pool || pool.length === 0) return null;
                const randomIndex = Math.floor(Math.random() * pool.length);
                return pool[randomIndex];
            }

            // ==================== 生成选择题选项 ====================
            function generateChoiceOptions(correctChinese, level) {
                const pool = contentDB[level];
                const otherOptions = pool
                    .filter(item => item.chinese !== correctChinese)
                    .map(item => item.chinese);
                // 随机打乱并取3个
                const shuffled = otherOptions.sort(() => Math.random() - 0.5);
                const distractors = shuffled.slice(0, Math.min(3, shuffled.length));
                // 如果不够3个，从其他等级补充
                if (distractors.length < 3) {
                    const allChinese = [];
                    for (const key in contentDB) {
                        if (key !== level) {
                            contentDB[key].forEach(item => {
                                if (item.chinese !== correctChinese && !allChinese.includes(item
                                        .chinese)) {
                                    allChinese.push(item.chinese);
                                }
                            });
                        }
                    }
                    const extraShuffled = allChinese.sort(() => Math.random() - 0.5);
                    while (distractors.length < 3 && extraShuffled.length > 0) {
                        const extra = extraShuffled.shift();
                        if (!distractors.includes(extra)) {
                            distractors.push(extra);
                        }
                    }
                }
                // 合并正确答案和干扰项，随机排列
                const allOptions = [correctChinese, ...distractors.slice(0, 3)];
                const finalShuffled = allOptions.sort(() => Math.random() - 0.5);
                const letters = ['A', 'B', 'C', 'D'];
                return finalShuffled.map((opt, i) => ({
                    letter: letters[i],
                    text: opt,
                    isCorrect: opt === correctChinese
                }));
            }

            // ==================== 渲染学习内容 ====================
            function renderContent(content) {
                if (!content) return;

                // 词汇标签
                const vocabHTML = content.vocabulary.map(v =>
                    `<span class="vocab-chip">${v.word} <span class="vocab-meaning">${v.meaning}</span></span>`
                ).join('');

                contentCard.classList.remove('empty-state');
                contentCard.innerHTML = `
                    <h3>📖 学习内容</h3>
                    <div class="korean-text">${content.korean}</div>
                    <div class="chinese-text">💬 ${content.chinese}</div>
                    <div class="info-row">
                        <span class="info-tag"><span class="tag-icon">📝</span> 关键词汇</span>
                    </div>
                    <div class="vocab-list">${vocabHTML}</div>
                    <div style="margin-top:14px;">
                        <span class="info-tag"><span class="tag-icon">🗣️</span> 发音提示</span>
                    </div>
                    <div class="pronunciation-tip" style="margin-top:6px;">${content.pronunciation.replace(/\n/g, '<br>')}</div>
                `;

                audioSection.style.display = 'flex';
                audioStatus.textContent = '';
                btnPlay.classList.remove('playing');
                isPlaying = false;
            }

            // ==================== 渲染作业 ====================
            function renderExercises(content, level) {
                if (!content) return;

                // 听写题
                inputDictation.value = '';

                // 选择题
                const options = generateChoiceOptions(content.chinese, level);
                choiceOptions.innerHTML = options.map(opt => `
                    <label class="ex-option" data-correct="${opt.isCorrect}">
                        <span class="opt-letter">${opt.letter}</span>
                        <span>${opt.text}</span>
                    </label>
                `).join('');

                // 填空题
                fillSentenceDisplay.textContent = content.fillBlank.sentence;
                inputFill.value = '';

                // 翻译题
                translatePrompt.textContent = content.chinese;
                inputTranslate.value = '';

                exercisesContainer.style.display = 'block';
                answerSection.style.display = 'block';
                answersPanel.classList.remove('visible');
                answersVisible = false;
                btnAnswer.textContent = '🔍 查看答案';
                btnAnswer.classList.remove('showing');
            }

            // ==================== 渲染答案 ====================
            function renderAnswers(content, level) {
                if (!content) return;
                const options = generateChoiceOptions(content.chinese, level);
                const correctOption = options.find(o => o.isCorrect);

                answersPanel.innerHTML = `
                    <div class="answer-item">
                        <span class="answer-label">🎧 听写题答案</span>
                        <div class="answer-value">${content.korean}</div>
                    </div>
                    <div class="answer-item">
                        <span class="answer-label">✅ 选择题答案</span>
                        <div class="answer-value zh">正确答案：${correctOption ? correctOption.letter : ''}. ${content.chinese}</div>
                    </div>
                    <div class="answer-item">
                        <span class="answer-label">✏️ 填空题答案</span>
                        <div class="answer-value">${content.fillBlank.answer}</div>
                        <div style="font-family:var(--font-korean);color:var(--text);margin-top:2px;">完整句子：${content.korean}</div>
                    </div>
                    <div class="answer-item">
                        <span class="answer-label">🌐 翻译题答案</span>
                        <div class="answer-value">${content.korean}</div>
                    </div>
                `;
            }

            // ==================== 语音合成 ====================
            function getKoreanVoice() {
                const voices = speechSynthesis.getVoices();
                // 优先查找韩语语音
                let koreanVoice = voices.find(v => v.lang === 'ko-KR' && v.localService);
                if (!koreanVoice) {
                    koreanVoice = voices.find(v => v.lang === 'ko-KR');
                }
                if (!koreanVoice) {
                    koreanVoice = voices.find(v => v.lang.startsWith('ko'));
                }
                return koreanVoice || null;
            }

            function speakKorean(text, onStart, onEnd) {
                // 停止之前的播放
                speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ko-KR';
                utterance.rate = 0.85; // 稍慢，适合学习
                utterance.pitch = 1.0;
                utterance.volume = 1.0;

                const koreanVoice = getKoreanVoice();
                if (koreanVoice) {
                    utterance.voice = koreanVoice;
                }

                utterance.onstart = () => {
                    if (onStart) onStart();
                };
                utterance.onend = () => {
                    if (onEnd) onEnd();
                };
                utterance.onerror = (e) => {
                    console.warn('语音合成错误:', e);
                    if (onEnd) onEnd();
                    if (e.error !== 'canceled' && e.error !== 'interrupted') {
                        showToast('⚠️ 语音播放失败，请检查浏览器是否支持韩语语音');
                    }
                };

                speechSynthesis.speak(utterance);
            }

            function handlePlayAudio() {
                if (!currentContent) {
                    showToast('请先生成学习内容');
                    return;
                }
                if (isPlaying) {
                    speechSynthesis.cancel();
                    isPlaying = false;
                    btnPlay.classList.remove('playing');
                    btnPlay.querySelector('.play-icon').textContent = '🔊';
                    audioStatus.textContent = '已停止';
                    return;
                }
                speakKorean(
                    currentContent.korean,
                    () => {
                        isPlaying = true;
                        btnPlay.classList.add('playing');
                        btnPlay.querySelector('.play-icon').textContent = '⏸️';
                        audioStatus.textContent = '正在播放...';
                    },
                    () => {
                        isPlaying = false;
                        btnPlay.classList.remove('playing');
                        btnPlay.querySelector('.play-icon').textContent = '🔊';
                        audioStatus.textContent = '播放完毕 ✓';
                        setTimeout(() => {
                            if (audioStatus.textContent === '播放完毕 ✓') {
                                audioStatus.textContent = '';
                            }
                        }, 3000);
                    }
                );
            }

            // ==================== 事件监听 ====================
            // 难度选择
            diffButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    diffButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    showToast(
                        `已选择：${btn.textContent.trim().split('\n')[0]} ${btn.querySelector('.level-num') ? '· ' + btn.querySelector('.level-num').textContent : ''}`
                        );
                });
            });

            // 生成内容
            btnGenerate.addEventListener('click', () => {
                const content = getRandomContent(currentLevel);
                if (!content) {
                    showToast('⚠️ 该等级暂无内容，请选择其他等级');
                    return;
                }
                currentContent = content;
                renderContent(content);
                renderExercises(content, currentLevel);
                renderAnswers(content, currentLevel);
                // 滚动到内容区
                contentCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                showToast('✅ 学习内容已生成！');
            });

            // 播放音频
            btnPlay.addEventListener('click', handlePlayAudio);

            // 小播放按钮（听写题）
            btnMiniPlay.addEventListener('click', () => {
                if (!currentContent) {
                    showToast('请先生成学习内容');
                    return;
                }
                // 使用独立的播放（不与主按钮状态冲突）
                speechSynthesis.cancel();
                if (isPlaying) {
                    isPlaying = false;
                    btnPlay.classList.remove('playing');
                    btnPlay.querySelector('.play-icon').textContent = '🔊';
                    audioStatus.textContent = '';
                }
                speakKorean(
                    currentContent.korean,
                    () => {
                        btnMiniPlay.textContent = '⏸️ 正在播放...';
                        btnMiniPlay.style.background = '#FFE4E0';
                    },
                    () => {
                        btnMiniPlay.textContent = '🔊 点击播放音频';
                        btnMiniPlay.style.background = '#FFF0EE';
                    }
                );
            });

            // 查看答案
            btnAnswer.addEventListener('click', () => {
                if (!currentContent) {
                    showToast('请先生成学习内容');
                    return;
                }
                answersVisible = !answersVisible;
                if (answersVisible) {
                    answersPanel.classList.add('visible');
                    btnAnswer.textContent = '🔒 隐藏答案';
                    btnAnswer.classList.add('showing');
                    answersPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    answersPanel.classList.remove('visible');
                    btnAnswer.textContent = '🔍 查看答案';
                    btnAnswer.classList.remove('showing');
                }
            });

            // ==================== 初始化 ====================
            function init() {
                // 预加载语音列表
                if ('speechSynthesis' in window) {
                    speechSynthesis.getVoices();
                    speechSynthesis.onvoiceschanged = () => {
                        speechSynthesis.getVoices();
                    };
                } else {
                    showToast('⚠️ 您的浏览器不支持语音合成，请使用Chrome或Edge');
                }

                // 默认选中零基础，自动生成第一组内容
                const defaultContent = getRandomContent('zero');
                if (defaultContent) {
                    currentContent = defaultContent;
                    renderContent(defaultContent);
                    renderExercises(defaultContent, 'zero');
                    renderAnswers(defaultContent, 'zero');
                }

                console.log('🇰🇷 韩语音频学习助手 MVP v1.0 已就绪');
                console.log('   当前等级:', currentLevel);
                console.log('   语音合成:', 'speechSynthesis' in window ? '✅ 支持' : '❌ 不支持');
            }

            init();
        })();
    </script>
</body>
</html>
