<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩语音频学习助手</title>
    <style>
        :root {
            --primary: #5B6FE8;
            --primary-dark: #4A5BD4;
            --primary-light: #EEF0FD;
            --accent: #FF7E67;
            --accent-hover: #E8694F;
            --bg: #f6f7fb;
            --card-bg: #ffffff;
            --text: #2D3142;
            --text-light: #6B7194;
            --text-lighter: #9BA0B8;
            --border: #E4E7F0;
            --border-light: #F0F2F8;
            --shadow-sm: 0 1px 3px rgba(45, 49, 66, 0.06);
            --shadow: 0 4px 16px rgba(45, 49, 66, 0.08);
            --shadow-lg: 0 12px 32px rgba(45, 49, 66, 0.12);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-korean: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', 'Nanum Gothic', sans-serif;
            --font-chinese: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-chinese);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(91, 111, 232, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -180px;
            left: -120px;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 126, 103, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* ========== 顶部标题 ========== */
        .header {
            text-align: center;
            padding: 36px 20px 20px;
            position: relative;
        }
        .header .icon-row {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .header .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #5B6FE8 0%, #7B8FF0 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 6px 20px rgba(91, 111, 232, 0.3);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .header .subtitle {
            font-size: 15px;
            color: var(--text-light);
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ========== 难度选择区 ========== */
        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-lighter);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-align: center;
        }
        .difficulty-section {
            margin-bottom: 20px;
        }
        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        @media (max-width: 520px) {
            .difficulty-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
        }
        .diff-btn {
            position: relative;
            padding: 14px 10px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--card-bg);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            transition: all var(--transition);
            text-align: center;
            user-select: none;
            outline: none;
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.3px;
        }
        .diff-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .diff-btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }
        .diff-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
            box-shadow: 0 6px 20px rgba(91, 111, 232, 0.35);
            transform: translateY(-1px);
        }
        .diff-btn .level-num {
            display: block;
            font-size: 11px;
            font-weight: 500;
            opacity: 0.7;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .diff-btn.active .level-num {
            opacity: 0.9;
        }

        /* ========== 生成按钮 ========== */
        .generate-section {
            text-align: center;
            margin-bottom: 24px;
        }
        .btn-generate {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            background: linear-gradient(135deg, #FF7E67 0%, #FF9A7C 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 28px rgba(255, 126, 103, 0.35);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            user-select: none;
            outline: none;
        }
        .btn-generate::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            pointer-events: none;
        }
        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(255, 126, 103, 0.45);
        }
        .btn-generate:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 126, 103, 0.35);
        }
        .btn-generate .sparkle {
            font-size: 20px;
            animation: sparkle-pulse 1.8s ease-in-out infinite;
        }
        @keyframes sparkle-pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.25);
            }
        }
        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 4px 12px rgba(255, 126, 103, 0.2);
        }

        /* ========== 内容卡片 ========== */
        .content-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            transition: all var(--transition);
        }
        .content-card.empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-lighter);
        }
        .content-card.empty-state .empty-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            opacity: 0.6;
        }
        .content-card.empty-state p {
            font-size: 15px;
        }
        .content-card h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-lighter);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .content-card h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: var(--primary);
            border-radius: 2px;
            flex-shrink: 0;
        }
        .korean-text {
            font-family: var(--font-korean);
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 12px;
            padding: 14px 18px;
            background: #FAFBFC;
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--primary);
            letter-spacing: 0.5px;
            word-break: keep-all;
        }
        .chinese-text {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 16px;
            padding-left: 18px;
            line-height: 1.5;
        }
        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 6px;
        }
        .info-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 20px;
            background: #F8F9FC;
            color: var(--text-light);
            font-weight: 500;
        }
        .info-tag .tag-icon {
            font-size: 14px;
        }
        .vocab-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .vocab-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            background: var(--primary-light);
            color: var(--primary-dark);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font-korean);
            letter-spacing: 0.3px;
        }
        .vocab-chip .vocab-meaning {
            font-family: var(--font-chinese);
            font-size: 12px;
            opacity: 0.8;
            font-weight: 400;
        }
        .pronunciation-tip {
            font-size: 13px;
            color: #8E6F3E;
            background: #FFFDF5;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid #F0E8D0;
            font-family: var(--font-mono);
            letter-spacing: 0.3px;
            line-height: 1.5;
        }

        /* ========== 音频播放区 ========== */
        .audio-section {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .btn-play {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 14px rgba(91, 111, 232, 0.3);
            user-select: none;
            outline: none;
            letter-spacing: 0.3px;
        }
        .btn-play:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(91, 111, 232, 0.4);
        }
        .btn-play:active {
            transform: translateY(0);
        }
        .btn-play.playing {
            background: #E85D6F;
            animation: play-glow 0.8s ease-in-out infinite;
        }
        @keyframes play-glow {
            0%,
            100% {
                box-shadow: 0 4px 14px rgba(232, 93, 111, 0.3);
            }
            50% {
                box-shadow: 0 8px 28px rgba(232, 93, 111, 0.55);
            }
        }
        .btn-play .play-icon {
            font-size: 18px;
            line-height: 1;
        }
        .audio-status {
            font-size: 13px;
            color: var(--text-lighter);
            font-style: italic;
        }

        /* ========== 作业区 ========== */
        .exercises-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        @media (max-width: 560px) {
            .exercises-grid {
                grid-template-columns: 1fr;
            }
        }
        .exercise-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 16px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }
        .exercise-card:hover {
            box-shadow: var(--shadow);
        }
        .exercise-card .ex-type {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .ex-type.dictation {
            background: #FFF0EE;
            color: #D44A3A;
        }
        .ex-type.choice {
            background: #EEF4FF;
            color: #3A6BD4;
        }
        .ex-type.fill {
            background: #F0FAF0;
            color: #3A8C4A;
        }
        .ex-type.translate {
            background: #FFF8ED;
            color: #C07A20;
        }
        .exercise-card .ex-question {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .exercise-card .ex-input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-korean);
            transition: all var(--transition);
            background: #FAFBFC;
            color: var(--text);
            outline: none;
            letter-spacing: 0.3px;
        }
        .exercise-card .ex-input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(91, 111, 232, 0.08);
        }
        .exercise-card .ex-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .exercise-card .ex-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #FAFBFC;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition);
            user-select: none;
            font-weight: 500;
        }
        .exercise-card .ex-option:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .exercise-card .ex-option .opt-letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
            color: var(--text-light);
        }
        .exercise-card .ex-hint {
            font-size: 12px;
            color: var(--text-lighter);
            margin-top: 6px;
        }
        .mini-play-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: #FFF0EE;
            color: #D44A3A;
            border: 1px solid #FDD;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
            margin-bottom: 8px;
            user-select: none;
            outline: none;
        }
        .mini-play-btn:hover {
            background: #FFE4E0;
        }

        /* ========== 答案区 ========== */
        .answer-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-answer {
            padding: 14px 32px;
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
            transition: all var(--transition);
            user-select: none;
            outline: none;
            letter-spacing: 0.3px;
            box-shadow: var(--shadow-sm);
        }
        .btn-answer:hover {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: var(--shadow);
        }
        .btn-answer.showing {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary-dark);
        }
        .answers-panel {
            display: none;
            background: #FAFBFC;
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 12px;
            border: 1px solid var(--border);
            text-align: left;
        }
        .answers-panel.visible {
            display: block;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .answers-panel .answer-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
            line-height: 1.6;
        }
        .answers-panel .answer-item:last-child {
            border-bottom: none;
        }
        .answers-panel .answer-label {
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .answers-panel .answer-value {
            font-family: var(--font-korean);
            color: #2D6B3F;
            font-weight: 500;
            font-size: 15px;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }
        .answers-panel .answer-value.zh {
            font-family: var(--font-chinese);
            color: var(--text);
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #2D3142;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            z-index: 999;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            letter-spacing: 0.3px;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ========== Footer ========== */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: var(--text-lighter);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="icon-row">
                <div class="logo-icon">🇰🇷</div>
            </div>
            <h1>韩语短文学习助手</h1>
            <p class="subtitle">选择等级，AI 自动生成对应难度的韩语短文</p>
        </header>

        <div class="difficulty-section">
            <div class="section-label">📊 选择难度等级</div>
            <div class="difficulty-grid" id="difficultyGrid">
                <button class="diff-btn active" data-level="zero">
                    零基础<span class="level-num">入门短文</span>
                </button>
                <button class="diff-btn" data-level="topik1">
                    TOPIK 1<span class="level-num">初级短文</span>
                </button>
                <button class="diff-btn" data-level="topik2">
                    TOPIK 2<span class="level-num">中级短文</span>
                </button>
                <button class="diff-btn" data-level="topik3">
                    TOPIK 3<span class="level-num">进阶短文</span>
                </button>
            </div>
        </div>

        <div class="generate-section">
            <button class="btn-generate" id="btnGenerate">
                <span class="sparkle">✨</span> 生成韩语短文
            </button>
        </div>

        <div class="content-card empty-state" id="contentCard">
            <span class="empty-icon">📖</span>
            <p>请选择难度等级，然后点击生成韩语短文</p>
        </div>

        <div class="footer">
            韩语短文学习助手 · AI 短文版
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const difficultyGrid = document.getElementById('difficultyGrid');
            const diffButtons = difficultyGrid.querySelectorAll('.diff-btn');
            const btnGenerate = document.getElementById('btnGenerate');
            const contentCard = document.getElementById('contentCard');
            const toast = document.getElementById('toast');

            let currentLevel = 'zero';
            let toastTimer = null;
            let isLoading = false;

            function showToast(msg) {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.classList.add('show');
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
            }

            const levelMap = {
                zero: '韩语零基础。只能使用最简单的问候、自我介绍、日常词汇。句子要非常短。',
                topik1: 'TOPIK 1。使用简单日常生活主题，例如吃饭、购物、天气、学校、时间。',
                topik2: 'TOPIK 2。短文可以稍微长一点，包含原因、计划、感受，但不要太难。',
                topik3: 'TOPIK 3。表达更自然，可以包含转折、原因、建议、观点，接近真实韩国人表达。'
            };

            // 备用短文：如果后端没接好，会显示这些内容，避免页面空白
            const fallbackDB = {
                zero: {
                    korean: '안녕하세요. 저는 학생입니다. 한국어를 공부합니다. 매일 조금씩 배웁니다.',
                    chinese: '你好。我是学生。我学习韩语。我每天一点点地学习。',
                    vocabulary: [
                        { word: '안녕하세요', meaning: '你好' },
                        { word: '학생', meaning: '学生' },
                        { word: '공부하다', meaning: '学习' },
                        { word: '매일', meaning: '每天' }
                    ]
                },
                topik1: {
                    korean: '오늘은 날씨가 좋습니다. 저는 친구와 카페에 갔습니다. 커피를 마시고 이야기를 했습니다.',
                    chinese: '今天天气很好。我和朋友去了咖啡店。喝了咖啡，也聊了天。',
                    vocabulary: [
                        { word: '날씨', meaning: '天气' },
                        { word: '친구', meaning: '朋友' },
                        { word: '카페', meaning: '咖啡店' },
                        { word: '이야기하다', meaning: '聊天' }
                    ]
                },
                topik2: {
                    korean: '요즘 저는 한국어 공부에 관심이 많습니다. 매일 짧은 글을 읽고 새로운 단어를 외웁니다. 아직 어렵지만 조금씩 좋아지고 있습니다.',
                    chinese: '最近我对韩语学习很感兴趣。每天读短文，背新单词。虽然还很难，但正在一点点变好。',
                    vocabulary: [
                        { word: '요즘', meaning: '最近' },
                        { word: '관심', meaning: '兴趣' },
                        { word: '외우다', meaning: '背诵' },
                        { word: '조금씩', meaning: '一点点' }
                    ]
                },
                topik3: {
                    korean: '외국어를 배울 때 가장 중요한 것은 꾸준함이라고 생각합니다. 하루에 많은 시간을 공부하지 못해도 매일 계속하면 실력이 조금씩 늘어납니다. 그래서 저는 짧은 글을 읽는 습관을 만들려고 합니다.',
                    chinese: '我认为学习外语时最重要的是坚持。即使每天不能学习很久，只要每天持续，能力也会一点点提高。所以我想养成阅读短文的习惯。',
                    vocabulary: [
                        { word: '꾸준함', meaning: '坚持、持续性' },
                        { word: '실력', meaning: '实力、能力' },
                        { word: '늘어나다', meaning: '增长、提高' },
                        { word: '습관', meaning: '习惯' }
                    ]
                }
            };

            function normalizeVocabulary(vocab) {
                if (Array.isArray(vocab)) return vocab;
                if (typeof vocab === 'string') {
                    return vocab.split(/[,，、]/).map(item => {
                        const match = item.match(/(.+?)[（(](.+?)[）)]/);
                        return match ? { word: match[1].trim(), meaning: match[2].trim() } : { word: item.trim(), meaning: '' };
                    }).filter(v => v.word);
                }
                return [];
            }

            function renderContent(content, isFallback = false) {
                const vocabulary = normalizeVocabulary(content.vocabulary || content.vocab);
                const vocabHTML = vocabulary.map(v =>
                    `<span class="vocab-chip">${v.word}<span class="vocab-meaning">${v.meaning}</span></span>`
                ).join('');

                contentCard.classList.remove('empty-state');
                contentCard.innerHTML = `
                    <h3>📖 韩语短文</h3>
                    ${isFallback ? '<p style="color:#9BA0B8;font-size:13px;margin-bottom:10px;">当前显示备用短文。接好后端 API 后，每次会自动生成不同内容。</p>' : ''}
                    <div class="korean-text">${content.korean}</div>
                    <div class="chinese-text">💬 ${content.chinese}</div>
                    <div class="info-row">
                        <span class="info-tag"><span class="tag-icon">📝</span> 关键词汇</span>
                    </div>
                    <div class="vocab-list">${vocabHTML}</div>
                `;
            }

            async function fetchAIText(level) {
                const prompt = `你是一位专业韩语老师。请给中文母语学习者生成一段韩语短文。
学生等级：${levelMap[level]}

要求：
1. 生成一段韩语短文，3到6句。
2. 内容自然、地道，适合该等级。
3. 给出准确中文翻译。
4. 给出5个以内关键词汇。
5. 只返回 JSON，不要返回其他解释。

JSON格式：
{
  "korean": "韩语短文",
  "chinese": "中文翻译",
  "vocabulary": [
    {"word":"韩语词", "meaning":"中文意思"}
  ]
}`;

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level, prompt })
                });

                if (!response.ok) throw new Error('API 请求失败');
                return await response.json();
            }

            diffButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    diffButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    showToast(`已选择：${btn.textContent.trim().split('\n')[0]}`);
                });
            });

            btnGenerate.addEventListener('click', async () => {
                if (isLoading) return;
                isLoading = true;
                btnGenerate.disabled = true;
                btnGenerate.innerHTML = '<span class="sparkle">⏳</span> 正在生成短文...';

                try {
                    const content = await fetchAIText(currentLevel);
                    renderContent(content, false);
                    showToast('✅ AI短文已生成！');
                } catch (error) {
                    console.warn('AI生成失败，显示备用短文：', error);
                    renderContent(fallbackDB[currentLevel], true);
                    showToast('⚠️ 后端未连接，先显示备用短文');
                } finally {
                    isLoading = false;
                    btnGenerate.disabled = false;
                    btnGenerate.innerHTML = '<span class="sparkle">✨</span> 生成韩语短文';
                    contentCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });

            renderContent(fallbackDB.zero, true);
            console.log('🇰🇷 韩语短文学习助手 AI版 已就绪');
        })();
    </script>
</body>
</html>
